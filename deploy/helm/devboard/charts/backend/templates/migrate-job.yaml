# Runs `alembic upgrade head` before the app rolls out, on every install/upgrade.
# post-install/post-upgrade so the database (and its hook-weighted openfga
# migrate) are already up; hook-weight orders it after infra is ready.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-backend-migrate
  labels:
    {{- include "devboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-migrate
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend-migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.global.imageRegistry }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["alembic", "upgrade", "head"]
          env:
            {{- include "backend.dbEnv" . | nindent 12 }}
