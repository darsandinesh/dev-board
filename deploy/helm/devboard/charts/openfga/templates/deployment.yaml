apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-openfga
  labels:
    {{- include "devboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: openfga
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: openfga
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: openfga
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: openfga
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args: ["run"]
          env:
            - name: OPENFGA_DATASTORE_ENGINE
              value: postgres
            - name: OPENFGA_DATASTORE_URI
              value: postgres://{{ .Release.Name }}-postgres:5432/openfga?sslmode=disable
            - name: OPENFGA_DATASTORE_USERNAME
              value: {{ .Values.global.postgres.user | quote }}
            - name: OPENFGA_DATASTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "devboard.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: OPENFGA_HTTP_ADDR
              value: 0.0.0.0:8082
            - name: OPENFGA_GRPC_ADDR
              value: 0.0.0.0:8081
          ports:
            - { name: http, containerPort: 8082 }
            - { name: grpc, containerPort: 8081 }
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
