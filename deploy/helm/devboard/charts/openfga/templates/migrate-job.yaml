# Creates OpenFGA's schema in the `openfga` database before the server starts.
# Helm hook ordering: runs on install/upgrade, after the Secret exists.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-openfga-migrate
  labels:
    {{- include "devboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: openfga-migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/component: openfga-migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args: ["migrate"]
          env:
            - name: OPENFGA_DATASTORE_ENGINE
              value: postgres
            - name: OPENFGA_DATASTORE_URI
              value: postgres://{{ .Release.Name }}-postgres:5432/openfga?sslmode=disable
            - name: OPENFGA_DATASTORE_USERNAME
              value: {{ .Values.global.postgres.user | quote }}
            - name: OPENFGA_DATASTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "devboard.secretName" . }}
                  key: POSTGRES_PASSWORD
