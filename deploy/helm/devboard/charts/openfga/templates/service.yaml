apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-openfga
  labels:
    {{- include "devboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: openfga
spec:
  selector:
    app.kubernetes.io/component: openfga
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - { name: http, port: 8082, targetPort: 8082 }
    - { name: grpc, port: 8081, targetPort: 8081 }
