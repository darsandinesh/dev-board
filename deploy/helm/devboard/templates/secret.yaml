# One Secret shared by backend (db + keycloak client) and frontend (nextauth +
# keycloak client). Subcharts reference it by name via secretKeyRef.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devboard.secretName" . }}
  labels:
    {{- include "devboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  KEYCLOAK_CLIENT_SECRET: {{ .Values.secrets.keycloakClientSecret | quote }}
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | quote }}
